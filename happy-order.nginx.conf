# ============================================================
# 幸福小厨 🏠 家庭点单系统 - Nginx 配置
# Nginx 1.25.5 + PHP 8.2 FPM
# ============================================================

# 创建 server 节点前，先检查 PHP-FPM 是否在运行
# sudo systemctl status php8.2-fpm
# 如果未运行：sudo systemctl start php8.2-fpm

server {
    listen 80;
    # 如果有域名，把下行的 _ 换成你的域名
    server_name _;

    # ── 修改为你的项目绝对路径 ──
    root /var/www/happy-order;
    index index.php;

    # 字符集
    charset utf-8;

    # ============================================================
    # 静态资源：CSS / JS / 图片 直接发给浏览器，不走 PHP
    # ============================================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|ttf|eot|json)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # 根路径：优先找文件，其次目录，最后走 PHP
    # ============================================================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # PHP 请求转发到 PHP-FPM
    # ============================================================
    location ~ \.php$ {
        # 如果请求的文件不存在，直接返回 404（防恶意路径）
        try_files $uri =404;

        # PHP-FPM 监听地址（二选一，取决于你的安装方式）
        # ── 方案 A：Unix Socket（推荐，性能更好）──
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;

        # ── 方案 B：TCP（如果用的是 TCP 方式，注释上行，放开下行）──
        # fastcgi_pass 127.0.0.1:9000;

        # PHP-FPM 入口文件
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # 引入 FastCGI 标配参数
        include fastcgi_params;

        # 超时设置（安装向导可能需要长一点的时间）
        fastcgi_connect_timeout 30;
        fastcgi_send_timeout    60;
        fastcgi_read_timeout    60;

        # 缓冲区（Composer / 大 JSON 响应可能需要）
        fastcgi_buffers         8 16k;
        fastcgi_buffer_size     32k;

        # 确保中文文件名正常
        fastcgi_param QUERY_STRING  $query_string;
    }

    # ============================================================
    # 安全：禁止访问隐藏文件和敏感目录
    # ============================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止直接访问 sql/ 和 config/ 目录
    location ~ ^/(sql|config)/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # 安全头（可选，增强安全性）
    # ============================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ============================================================
    # 日志（可选，调试时可开启 access_log）
    # ============================================================
    # access_log /var/log/nginx/happy-order-access.log;
    error_log  /var/log/nginx/happy-order-error.log;
}
